<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miles's Game Hub</title>
    <style>
        /* Modern Dark Theme */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        header {
            width: 100%;
            padding: 20px;
            text-align: center;
            background: #1f1f1f;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .hero-text {
            text-align: center;
            margin-bottom: 30px;
        }

        .play-btn {
            background-color: #6200ee;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 5px 15px rgba(98, 0, 238, 0.4);
        }

        .play-btn:hover {
            background-color: #7c4dff;
            transform: scale(1.05);
        }

        /* The Game Frame (hidden at first) */
        #gameFrame {
            display: none;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>Miles's Game Hub</h1>
    </header>

    <div id="main-content">
        <div id="lobby">
            <div class="hero-text">
                <h2>Welcome to Eaglercraft</h2>
                <p>Version 1.8 - Hosted by Miles Cromar</p>
            </div>
            <button class="play-btn" onclick="launchGame()">LAUNCH GAME</button>
        </div>
        
        <iframe id="gameFrame" allowfullscreen="true"></iframe>
    </div>

    <script>
        async function launchGame() {
            const lobby = document.getElementById('lobby');
            const iframe = document.getElementById('gameFrame');
            const btn = document.querySelector('.play-btn');

            btn.innerText = "LOADING...";

            try {
                // Fetching your specific filename
                const response = await fetch('Game%20Code.xml');
                const text = await response.text();
                
                // Hide the menu, show the game
                lobby.style.display = 'none';
                iframe.style.display = 'block';

                const doc = iframe.contentDocument || iframe.contentWindow.document;
                doc.open();
                doc.write(text);
                doc.close();
            } catch (err) {
                console.error('Error:', err);
                alert('Could not find Game Code.xml. Make sure it is uploaded!');
                btn.innerText = "LAUNCH GAME";
            }
        }
    </script>
</body>
</html>
