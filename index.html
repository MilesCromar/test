<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAULT | Miles Cromar</title>
    <style>
        :root {
            --emerald: #064e40;
            --emerald-bright: #0d9488;
            --amber: #f59e0b;
            --amber-glow: rgba(245, 158, 11, 0.4);
            --dark-bg: #020617;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(13, 148, 136, 0.3);
        }

        body {
            margin: 0;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--dark-bg);
            color: #e2e8f0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        aside {
            width: 200px;
            background: #010409;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 30px 0;
            z-index: 100;
        }

        .nav-item {
            padding: 15px 30px;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--emerald-bright);
            cursor: pointer;
            transition: 0.3s;
            border-left: 3px solid transparent;
            font-weight: 700;
        }

        .nav-item:hover { background: rgba(13, 148, 136, 0.05); color: #fff; }
        .nav-item.active { color: var(--amber); border-left: 3px solid var(--amber); background: rgba(245, 158, 11, 0.05); }

        /* --- MAIN CONTENT --- */
        .app-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            height: 50px;
            background: #010409;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 30px;
            font-weight: 900;
            letter-spacing: 2px;
            font-size: 0.8rem;
        }

        .location-tag { color: var(--amber); margin-left: 15px; font-weight: 400; opacity: 0.7; text-transform: uppercase; }

        main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            background: radial-gradient(circle at center, #062d27 0%, #020617 100%);
        }

        /* Status Row */
        .status-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .status-box {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 15px 20px;
            border-radius: 4px;
        }

        .label { font-size: 0.6rem; color: var(--emerald-bright); text-transform: uppercase; margin-bottom: 5px; }
        .value { font-size: 0.9rem; color: #fff; font-family: monospace; }

        /* Pages */
        .page-content { display: none; }
        .page-content.active { display: block; }

        /* --- SQUARE GAME CARDS --- */
        h2 { font-size: 1rem; letter-spacing: 1px; margin-bottom: 25px; color: var(--emerald-bright); text-transform: uppercase; }
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 30px; }

        .game-card {
            background: #000; 
            border: 1px solid var(--border); 
            aspect-ratio: 1 / 1; /* FORCED SQUARE */
            border-radius: 8px; 
            cursor: pointer; 
            position: relative;
            overflow: hidden;
            transition: 0.3s;
        }

        .card-img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            transition: 0.4s ease;
            z-index: 1;
        }

        .card-info {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: 0.3s;
            z-index: 2;
            backdrop-filter: blur(10px); /* BLUR EFFECT */
        }

        .game-card:hover { border-color: var(--amber); box-shadow: 0 0 20px var(--amber-glow); }
        .game-card:hover .card-img { transform: scale(1.05); }
        .game-card:hover .card-info { opacity: 1; }

        .card-info h3 { font-size: 0.9rem; color: #fff; margin: 0; text-align: center; padding: 0 10px; }
        .card-info .icon { font-size: 2.5rem; margin-bottom: 10px; }

        /* Settings CSS */
        .settings-grid { display: flex; flex-direction: column; gap: 20px; max-width: 400px; }
        .setting-item { background: var(--glass); border: 1px solid var(--border); padding: 25px; border-radius: 4px; }
        .current-key-display { margin-top: 15px; font-size: 1.1rem; color: var(--amber); font-weight: 800; text-shadow: 0 0 10px var(--amber-glow); }
        input { width: 100%; background: #000; border: 1px solid var(--emerald-bright); color: #fff; padding: 12px; font-family: monospace; outline: none; }
        .config-btn { margin-top: 10px; background: transparent; border: 1px solid var(--emerald-bright); color: var(--emerald-bright); padding: 14px; cursor: pointer; width: 100%; text-transform: uppercase; font-size: 0.75rem; font-weight: bold; }
        .config-btn.listening { border-color: var(--amber); color: var(--amber); box-shadow: 0 0 15px var(--amber-glow); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        #game-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; }
        #close-btn { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.7); border: 1px solid var(--amber); color: #fff; padding: 8px 15px; cursor: pointer; z-index: 1000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <aside>
        <div class="nav-item active" onclick="showPage('main-page', 'Main')">Main</div>
        <div class="nav-item" onclick="showPage('library', 'Library')">Library</div>
        <div class="nav-item" onclick="showPage('settings', 'Settings')">Settings</div>
    </aside>

    <div class="app-container">
        <header>MILES_VAULT <span id="header-loc" class="location-tag">// MAIN</span></header>

        <main>
            <div class="status-row">
                <div class="status-box">
                    <div class="label">System</div>
                    <div class="value">ONLINE</div>
                </div>
                <div class="status-box">
                    <div class="label">Ping</div>
                    <div class="value" id="ping">12ms</div>
                </div>
                <div class="status-box">
                    <div class="label">Panic</div>
                    <div class="value" id="p-display">[ESCAPE] -> GOOGLE</div>
                </div>
            </div>

            <section id="main-page" class="page-content active">
                <h2>NEW GAMES</h2>
                <div class="game-grid">
                    
                    <div class="game-card" onclick="launchGame()">
                        <div class="card-img" style="background-image: url('https://wallpaperaccess.com/full/1271168.jpg');"></div>
                        <div class="card-info">
                            <div class="icon">⛏️</div>
                            <h3>Eaglercraft 1.8</h3>
                        </div>
                    </div>

                    <div class="game-card">
                        <div class="card-img" style="background-image: url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=2070&auto=format&fit=crop');"></div>
                        <div class="card-info">
                            <div class="icon">🕹️</div>
                            <h3>Coming Soon</h3>
                        </div>
                    </div>

                </div>
            </section>

            <section id="library" class="page-content">
                <h2>LIBRARY</h2>
                <p style="color: var(--emerald-bright); opacity: 0.6;">No archives available.</p>
            </section>

            <section id="settings" class="page-content">
                <h2>SETTINGS</h2>
                <div class="settings-grid">
                    <div class="setting-item">
                        <h4>Panic Switch</h4>
                        <button class="config-btn" id="bind-btn" onclick="startRebind()">Set Trigger Key</button>
                        <div id="active-key-text" class="current-key-display">KEY: ESCAPE</div>
                        <div style="margin-top: 30px;">
                            <label class="label">Emergency URL</label>
                            <input type="text" id="url-input" placeholder="https://google.com" onchange="updateUrl(this.value)">
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="game-view">
        <button id="close-btn" onclick="killGame()">CLOSE GAME</button>
        <iframe id="gameFrame" allowfullscreen></iframe>
    </div>

    <script>
        let pKey = "Escape";
        let pUrl = "https://www.google.com";
        let listening = false;

        function showPage(pageId, pageName) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            event.currentTarget.classList.add('active');
            document.getElementById('header-loc').innerText = `// ${pageName.toUpperCase()}`;
        }

        function startRebind() {
            listening = true;
            const btn = document.getElementById('bind-btn');
            btn.innerText = "LISTENING...";
            btn.classList.add('listening');
        }

        function updateUrl(val) {
            pUrl = val.startsWith('http') ? val : 'https://' + val;
            updateDisplay();
        }

        window.onkeydown = (e) => {
            if(listening) {
                pKey = e.key;
                listening = false;
                const btn = document.getElementById('bind-btn');
                btn.innerText = "SET TRIGGER KEY";
                btn.classList.remove('listening');
                document.getElementById('active-key-text').innerText = `KEY: ${pKey.toUpperCase()}`;
                updateDisplay();
                return;
            }
            if(e.key === pKey) window.location.href = pUrl;
        };

        function updateDisplay() {
            try {
                let host = new URL(pUrl).hostname.toUpperCase();
                document.getElementById('p-display').innerText = `[${pKey.toUpperCase()}] -> ${host}`;
            } catch(e) {
                document.getElementById('p-display').innerText = `[${pKey.toUpperCase()}] -> REDIRECT`;
            }
        }

        async function launchGame() {
            const frame = document.getElementById('gameFrame');
            const view = document.getElementById('game-view');
            try {
                const response = await fetch('Game%20Code.xml');
                const text = await response.text();
                view.style.display = 'block';
                const doc = frame.contentDocument || frame.contentWindow.document;
                doc.open(); doc.write(text); doc.close();
            } catch (e) { alert("XML File Not Found."); }
        }

        function killGame() {
            document.getElementById('game-view').style.display = 'none';
            document.getElementById('gameFrame').src = '';
        }

        setInterval(() => {
            document.getElementById('ping').innerText = (Math.floor(Math.random() * 5) + 10) + 'ms';
        }, 3000);
    </script>
</body>
</html>
