<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAULT | Miles Cromar</title>
    <style>
        :root {
            --emerald: #064e40;
            --emerald-bright: #0d9488;
            --amber: #f59e0b;
            --amber-glow: rgba(245, 158, 11, 0.4);
            --dark-bg: #020617;
            --glass: rgba(0, 0, 0, 0.7);
            --border: rgba(13, 148, 136, 0.4);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-bg);
            color: #e2e8f0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        aside {
            width: 200px;
            background: #010409;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 30px 0;
            z-index: 100;
        }

        .nav-item {
            padding: 15px 30px;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--emerald-bright);
            cursor: pointer;
            transition: 0.3s;
            border-left: 3px solid transparent;
            font-weight: 700;
        }

        .nav-item:hover { background: rgba(13, 148, 136, 0.05); color: #fff; }
        .nav-item.active { color: var(--amber); border-left: 3px solid var(--amber); background: rgba(245, 158, 11, 0.05); }

        /* --- MAIN CONTENT --- */
        .app-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            height: 50px;
            background: #010409;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 30px;
            font-weight: 900;
            letter-spacing: 2px;
            font-size: 0.8rem;
        }

        .location-tag { color: var(--amber); margin-left: 15px; font-weight: 400; opacity: 0.7; text-transform: uppercase; }

        main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            background: radial-gradient(circle at center, #062d27 0%, #020617 100%);
        }

        /* --- GRID SETUP --- */
        h2 { font-size: 1rem; letter-spacing: 1px; margin-bottom: 25px; color: var(--emerald-bright); text-transform: uppercase; }
        
        /* This grid will automatically add rows as you add more games */
        .game-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 25px; 
        }

        /* --- SQUARE CARD + TILT --- */
        .game-card {
            background: #000; 
            border: 1px solid var(--border); 
            aspect-ratio: 1 / 1; 
            border-radius: 8px; 
            cursor: pointer; 
            position: relative;
            overflow: hidden;
            transform-style: preserve-3d;
            perspective: 1000px;
            transition: transform 0.1s ease-out, border-color 0.3s, box-shadow 0.3s;
        }

        .card-img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        .card-info {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); 
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: 0.3s;
            z-index: 2;
            backdrop-filter: blur(15px); 
            transform: translateZ(20px);
        }

        .game-card:hover { border-color: var(--amber); box-shadow: 0 0 20px var(--amber-glow); }
        .game-card:hover .card-info { opacity: 1; }

        .card-info h3 { 
            font-size: 0.9rem; 
            color: #fff; 
            margin: 0; 
            text-align: center; 
            padding: 0 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Status & Other UI */
        .status-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-bottom: 50px; }
        .status-box { background: var(--glass); border: 1px solid var(--border); padding: 15px 20px; border-radius: 4px; backdrop-filter: blur(10px); }
        .label { font-size: 0.6rem; color: var(--emerald-bright); text-transform: uppercase; margin-bottom: 5px; }
        .value { font-size: 0.9rem; color: #fff; font-family: monospace; }
        .page-content { display: none; }
        .page-content.active { display: block; }
        #game-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; }
        #close-btn { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.7); border: 1px solid var(--amber); color: #fff; padding: 8px 15px; cursor: pointer; z-index: 1000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <aside>
        <div class="nav-item active" onclick="showPage('main-page', 'Main')">Main</div>
        <div class="nav-item" onclick="showPage('library', 'Library')">Library</div>
        <div class="nav-item" onclick="showPage('settings', 'Settings')">Settings</div>
    </aside>

    <div class="app-container">
        <header>MILES_VAULT <span id="header-loc" class="location-tag">// MAIN</span></header>

        <main>
            <div class="status-row">
                <div class="status-box"><div class="label">System</div><div class="value">ONLINE</div></div>
                <div class="status-box"><div class="label">Ping</div><div class="value" id="ping">12ms</div></div>
                <div class="status-box"><div class="label">Panic</div><div class="value" id="p-display">[ESC] -> GOOGLE</div></div>
            </div>

            <section id="main-page" class="page-content active">
                <h2>NEW GAMES</h2>
                <div class="game-grid">
                    
                    <div class="game-card" onmousemove="repel(event, this)" onmouseleave="resetCard(this)" onclick="launchGame()">
                        <div class="card-img" style="background-image: url('minecraft.png');"></div>
                        <div class="card-info">
                            <h3>Eaglercraft 1.8</h3>
                        </div>
                    </div>

                    <div class="game-card" onmousemove="repel(event, this)" onmouseleave="resetCard(this)">
                        <div class="card-img" style="background-image: url('YOUR_IMAGE_NAME.png');"></div>
                        <div class="card-info">
                            <h3>Game Title</h3>
                        </div>
                    </div>

                </div>
            </section>

            <section id="library" class="page-content"><h2>LIBRARY</h2></section>
            <section id="settings" class="page-content"><h2>SETTINGS</h2></section>
        </main>
    </div>

    <div id="game-view">
        <button id="close-btn" onclick="killGame()">CLOSE GAME</button>
        <iframe id="gameFrame" allowfullscreen></iframe>
    </div>

    <script>
        let pKey = "Escape";
        let pUrl = "https://www.google.com";

        function repel(e, card) {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            card.style.transform = `perspective(1000px) rotateX(${(centerY - y) / 8}deg) rotateY(${(x - centerX) / 8}deg) scale(1.02)`;
        }

        function resetCard(card) {
            card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1)`;
        }

        function showPage(pageId, pageName) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            event.currentTarget.classList.add('active');
            document.getElementById('header-loc').innerText = `// ${pageName.toUpperCase()}`;
        }

        window.onkeydown = (e) => { if(e.key === pKey) window.location.href = pUrl; };

        async function launchGame() {
            const view = document.getElementById('game-view');
            const frame = document.getElementById('gameFrame');
            try {
                const response = await fetch('Game%20Code.xml');
                const text = await response.text();
                view.style.display = 'block';
                const doc = frame.contentDocument || frame.contentWindow.document;
                doc.open(); doc.write(text); doc.close();
            } catch (e) { alert("XML File Missing."); }
        }

        function killGame() {
            document.getElementById('game-view').style.display = 'none';
            document.getElementById('gameFrame').src = '';
        }

        setInterval(() => { document.getElementById('ping').innerText = (Math.floor(Math.random() * 5) + 10) + 'ms'; }, 3000);
    </script>
</body>
</html>
