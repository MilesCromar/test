<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAULT | Miles Cromar</title>
    <style>
        :root {
            /* COLORS FROM YOUR REF IMAGE */
            --emerald: #064e40;
            --emerald-bright: #0d9488;
            --amber: #f59e0b;
            --amber-glow: rgba(245, 158, 11, 0.4);
            --dark-bg: #020617; /* Deepest teal-black */
            --glass: rgba(6, 78, 64, 0.15);
            --border: rgba(13, 148, 136, 0.3);
        }

        body {
            margin: 0;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--dark-bg);
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            height: 50px;
            background: #010409;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 30px;
            font-weight: 900;
            letter-spacing: 2px;
            font-size: 0.8rem;
        }

        .home-tag { color: var(--amber); margin-left: 15px; font-weight: 400; opacity: 0.8; }

        main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            /* Radial gradient matching the image depth */
            background: radial-gradient(circle at center, #062d27 0%, #020617 100%);
        }

        .status-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .status-box {
            background: var(--glass);
            border: 1px solid var(--border);
            border-left: 3px solid var(--amber); /* Amber accent like the image curves */
            padding: 15px 20px;
            border-radius: 4px;
            position: relative;
        }

        .label { font-size: 0.6rem; color: var(--emerald-bright); text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        .value { font-size: 0.9rem; color: #fff; font-family: monospace; }

        .panic-ui {
            display: none;
            position: absolute;
            top: 105%; left: -1px; width: calc(100% + 2px);
            background: #010409; border: 1px solid var(--amber);
            flex-direction: column; gap: 8px; padding: 12px;
            z-index: 200; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .p-btn {
            background: transparent; border: 1px solid var(--emerald-bright);
            color: var(--emerald-bright); font-size: 0.6rem; padding: 6px;
            cursor: pointer; text-transform: uppercase;
        }
        .p-btn:hover { background: var(--emerald-bright); color: #fff; }
        .p-input {
            background: #000; border: 1px solid var(--amber);
            color: #fff; font-size: 0.7rem; padding: 6px; outline: none; display: none;
        }

        h2 { font-size: 1rem; letter-spacing: 1px; margin-bottom: 25px; color: var(--emerald-bright); }
        
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 30px;
        }

        /* REPEL CARDS - EMERALD & AMBER */
        .game-card {
            background: var(--glass);
            border: 1px solid var(--border);
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            perspective: 1000px;
            transition: transform 0.1s ease-out, border-color 0.3s, box-shadow 0.3s;
            will-change: transform;
        }

        .game-card:hover {
            border-color: var(--amber);
            box-shadow: 0 0 25px var(--amber-glow);
            background: rgba(6, 78, 64, 0.3);
        }

        .icon { font-size: 2.5rem; margin-bottom: 10px; pointer-events: none; }
        .game-card h3 { font-size: 0.9rem; margin: 0; color: white; pointer-events: none; }

        #game-view {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 999;
        }

        #close-btn {
            position: absolute; top: 20px; right: 20px;
            background: rgba(0,0,0,0.7); border: 1px solid var(--amber);
            color: var(--amber); padding: 8px 15px; cursor: pointer; z-index: 1000;
        }
        #close-btn:hover { background: var(--amber); color: #000; font-weight: bold; }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <header>
        MILES_VAULT <span class="home-tag">// EMERALD_NODE</span>
    </header>

    <main>
        <div class="status-row">
            <div class="status-box">
                <div class="label">System State</div>
                <div class="value">ENCRYPTED_IDLE</div>
            </div>
            <div class="status-box">
                <div class="label">Sync Latency</div>
                <div class="value" id="ping">12ms</div>
            </div>
            <div class="status-box" id="panic-box" style="cursor: pointer;">
                <div class="label">Override_Key</div>
                <div class="value" id="p-display">[ESC] -> GOOGLE</div>
                <div class="panic-ui" id="p-menu">
                    <button class="p-btn" onclick="rebind()">Assign New Key</button>
                    <button class="p-btn" onclick="showInput()">Update Redirect</button>
                    <input type="text" id="p-input" class="p-input" placeholder="Secure URL...">
                </div>
            </div>
        </div>

        <h2>ACTIVE_DATA_PACKETS</h2>

        <div class="game-grid">
            <div class="game-card" onmousemove="repel(event, this)" onmouseleave="resetCard(this)" onclick="launchGame()">
                <div class="icon">⛏️</div>
                <h3>Eaglercraft 1.8</h3>
            </div>
            <div class="game-card" onmousemove="repel(event, this)" onmouseleave="resetCard(this)">
                <div class="icon">🕹️</div>
                <h3>Project_B</h3>
            </div>
        </div>
    </main>

    <div id="game-view">
        <button id="close-btn" onclick="killGame()">ABORT_SESSION</button>
        <iframe id="gameFrame"></iframe>
    </div>

    <script>
        let pKey = "Escape";
        let pUrl = "https://www.google.com";
        let listening = false;

        function repel(e, card) {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            const rotateX = (centerY - y) / 6; 
            const rotateY = (x - centerX) / 6;
            card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(0.98)`;
        }

        function resetCard(card) {
            card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1)`;
        }

        const menu = document.getElementById('p-menu');
        const box = document.getElementById('panic-box');
        const input = document.getElementById('p-input');

        box.onclick = (e) => {
            e.stopPropagation();
            menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
        };

        window.onclick = () => menu.style.display = 'none';

        function rebind() { listening = true; document.getElementById('p-display').innerText = "CALIBRATING..."; }
        function showInput() { input.style.display = 'block'; input.focus(); }

        input.onkeydown = (e) => {
            if(e.key === 'Enter') {
                pUrl = input.value.startsWith('http') ? input.value : 'https://' + input.value;
                input.style.display = 'none';
                updateP();
            }
        };

        window.onkeydown = (e) => {
            if(listening) { pKey = e.key; listening = false; updateP(); return; }
            if(e.key === pKey) window.location.href = pUrl;
        };

        function updateP() {
            let host = new URL(pUrl).hostname.toUpperCase();
            document.getElementById('p-display').innerText = `[${pKey.toUpperCase()}] -> ${host}`;
        }

        async function launchGame() {
            const frame = document.getElementById('gameFrame');
            const view = document.getElementById('game-view');
            try {
                const response = await fetch('Game%20Code.xml');
                const text = await response.text();
                view.style.display = 'block';
                const doc = frame.contentDocument || frame.contentWindow.document;
                doc.open(); doc.write(text); doc.close();
            } catch (e) { alert("Data Packet Missing."); }
        }

        function killGame() {
            document.getElementById('game-view').style.display = 'none';
            document.getElementById('gameFrame').src = '';
        }

        setInterval(() => {
            document.getElementById('ping').innerText = (Math.floor(Math.random() * 5) + 8) + 'ms';
        }, 3000);
    </script>
</body>
</html>
