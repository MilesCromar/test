<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAULT | Miles Cromar</title>
    <style>
        :root {
            --emerald: #064e40;
            --emerald-bright: #0d9488;
            --amber: #f59e0b;
            --amber-glow: rgba(245, 158, 11, 0.4);
            --dark-bg: #020617;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(13, 148, 136, 0.3);
        }

        body {
            margin: 0;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--dark-bg);
            color: #e2e8f0;
            display: flex; /* Sidebar Layout */
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        aside {
            width: 200px;
            background: #010409;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 30px 0;
            z-index: 100;
        }

        .nav-item {
            padding: 15px 30px;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--emerald-bright);
            cursor: pointer;
            transition: 0.3s;
            border-left: 3px solid transparent;
            font-weight: 700;
        }

        .nav-item:hover {
            background: rgba(13, 148, 136, 0.05);
            color: #fff;
        }

        .nav-item.active {
            color: var(--amber);
            border-left: 3px solid var(--amber);
            background: rgba(245, 158, 11, 0.05);
        }

        /* --- MAIN CONTENT --- */
        .app-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            height: 50px;
            background: #0a0a0c;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 30px;
            font-weight: 900;
            letter-spacing: 2px;
            font-size: 0.8rem;
        }

        .home-tag { color: var(--amber); margin-left: 15px; font-weight: 400; opacity: 0.7; }

        main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            background: radial-gradient(circle at center, #062d27 0%, #020617 100%);
        }

        /* Status Row - Exact sizes from your original */
        .status-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .status-box {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 15px 20px;
            border-radius: 4px;
            position: relative;
        }

        .label { font-size: 0.6rem; color: var(--emerald-bright); text-transform: uppercase; margin-bottom: 5px; }
        .value { font-size: 0.9rem; color: #fff; font-family: monospace; }

        /* Game Grid */
        h2 { font-size: 1rem; letter-spacing: 1px; margin-bottom: 25px; opacity: 0.8; }
        
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 30px;
        }

        /* Repel Cards */
        .game-card {
            background: var(--glass);
            border: 1px solid var(--border);
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s ease-out, border-color 0.3s, box-shadow 0.3s;
            transform-style: preserve-3d;
            perspective: 1000px;
            will-change: transform;
        }

        .game-card:hover {
            border-color: var(--amber);
            box-shadow: 0 0 20px var(--amber-glow);
        }

        .icon { font-size: 2.5rem; margin-bottom: 10px; pointer-events: none; }
        .game-card h3 { font-size: 0.9rem; margin: 0; color: white; pointer-events: none; }

        /* Panic Logic (Inside Override Box) */
        .panic-ui {
            display: none;
            position: absolute;
            top: 100%; left: -1px; width: calc(100% + 2px);
            background: #010409; border: 1px solid var(--amber);
            flex-direction: column; gap: 8px; padding: 12px;
            z-index: 200;
        }
        .p-btn {
            background: transparent; border: 1px solid var(--amber);
            color: var(--amber); font-size: 0.6rem; padding: 6px; cursor: pointer;
        }

        /* Game Overlay */
        #game-view {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 999;
        }

        #close-btn {
            position: absolute; top: 20px; right: 20px;
            background: rgba(0,0,0,0.7); border: 1px solid var(--amber);
            color: #fff; padding: 8px 15px; cursor: pointer; z-index: 1000;
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <aside>
        <div class="nav-item active">Home</div>
        <div class="nav-item">Library</div>
        <div class="nav-item">Settings</div>
    </aside>

    <div class="app-container">
        <header>
            MILES_VAULT <span class="home-tag">// EMERALD_CORE</span>
        </header>

        <main>
            <div class="status-row">
                <div class="status-box">
                    <div class="label">Network Node</div>
                    <div class="value">ACTIVE_SECURE</div>
                </div>
                <div class="status-box">
                    <div class="label">System Ping</div>
                    <div class="value" id="ping">12ms</div>
                </div>
                <div class="status-box" id="panic-box" style="cursor: pointer;">
                    <div class="label">Override_Link</div>
                    <div class="value" id="p-display">[ESC] -> GOOGLE</div>
                    <div class="panic-ui" id="p-menu">
                        <button class="p-btn" onclick="rebind()">Rebind Key</button>
                        <button class="p-btn" onclick="showInput()">Update URL</button>
                        <input type="text" id="p-input" style="display:none; width:100%; background:#000; color:#fff; border:1px solid var(--amber); font-size:0.7rem; padding:4px;" placeholder="URL...">
                    </div>
                </div>
            </div>

            <h2>AVAILABLE_PROJECTS</h2>

            <div class="game-grid">
                <div class="game-card" onmousemove="repel(event, this)" onmouseleave="resetCard(this)" onclick="launchGame()">
                    <div class="icon">⛏️</div>
                    <h3>Eaglercraft 1.8</h3>
                </div>

                <div class="game-card" onmousemove="repel(event, this)" onmouseleave="resetCard(this)">
                    <div class="icon">🕹️</div>
                    <h3>Project_B</h3>
                </div>
            </div>
        </main>
    </div>

    <div id="game-view">
        <button id="close-btn" onclick="killGame()">TERMINATE_SESSION</button>
        <iframe id="gameFrame" allowfullscreen="true"></iframe>
    </div>

    <script>
        let pKey = "Escape";
        let pUrl = "https://www.google.com";
        let listening = false;

        // Repel Tilt Logic
        function repel(e, card) {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            const rotateX = (centerY - y) / 6; 
            const rotateY = (x - centerX) / 6;
            card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(0.98)`;
        }

        function resetCard(card) {
            card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1)`;
        }

        // Panic Menu Logic
        const menu = document.getElementById('p-menu');
        const box = document.getElementById('panic-box');
        box.onclick = (e) => {
            e.stopPropagation();
            menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
        };
        window.onclick = () => menu.style.display = 'none';

        function rebind() { listening = true; document.getElementById('p-display').innerText = "LISTENING..."; }
        function showInput() { 
            const inp = document.getElementById('p-input');
            inp.style.display = 'block'; 
            inp.focus(); 
        }

        document.getElementById('p-input').onkeydown = (e) => {
            if(e.key === 'Enter') {
                pUrl = e.target.value.startsWith('http') ? e.target.value : 'https://' + e.target.value;
                e.target.style.display = 'none';
                updateP();
            }
        };

        window.onkeydown = (e) => {
            if(listening) { pKey = e.key; listening = false; updateP(); return; }
            if(e.key === pKey) window.location.href = pUrl;
        };

        function updateP() {
            let host = new URL(pUrl).hostname.toUpperCase();
            document.getElementById('p-display').innerText = `[${pKey.toUpperCase()}] -> ${host}`;
        }

        // Game Logic
        async function launchGame() {
            const frame = document.getElementById('gameFrame');
            const view = document.getElementById('game-view');
            try {
                const response = await fetch('Game%20Code.xml');
                const text = await response.text();
                view.style.display = 'block';
                const doc = frame.contentDocument || frame.contentWindow.document;
                doc.open(); doc.write(text); doc.close();
            } catch (e) { alert("Game Code.xml not found."); }
        }

        function killGame() {
            document.getElementById('game-view').style.display = 'none';
            document.getElementById('gameFrame').src = '';
        }

        setInterval(() => {
            document.getElementById('ping').innerText = (Math.floor(Math.random() * 5) + 10) + 'ms';
        }, 3000);
    </script>
</body>
</html>
