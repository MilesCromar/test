<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAULT | Miles Cromar</title>
    <style>
        :root {
            --neon-purple: #8b5cf6;
            --neon-blue: #06b6d4;
            --dark-bg: #050507;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--dark-bg);
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Fixed Header */
        header {
            height: 50px;
            background: #0a0a0c;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 30px;
            font-weight: 900;
            letter-spacing: 2px;
            font-size: 0.8rem;
        }

        .home-tag { color: var(--neon-purple); margin-left: 15px; font-weight: 400; opacity: 0.7; }

        /* Main Scrollable Area */
        main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            background: radial-gradient(circle at top left, #0f0f1a, #050507);
        }

        /* Status Boxes on Main Screen */
        .status-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .status-box {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 15px 20px;
            border-radius: 4px;
        }

        .label { font-size: 0.6rem; color: #64748b; text-transform: uppercase; margin-bottom: 5px; }
        .value { font-size: 0.9rem; color: var(--neon-blue); font-family: monospace; }

        /* Game Grid */
        h2 { font-size: 1rem; letter-spacing: 1px; margin-bottom: 25px; opacity: 0.8; }
        
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 30px;
        }

        /* Square "Repel" Cards */
        .game-card {
            background: var(--glass);
            border: 1px solid var(--border);
            aspect-ratio: 1 / 1; /* Makes them square */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s ease-out, border-color 0.3s, box-shadow 0.3s;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .game-card:hover {
            border-color: var(--neon-purple);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.1);
        }

        .icon { font-size: 2.5rem; margin-bottom: 10px; }
        .game-card h3 { font-size: 0.9rem; margin: 0; color: white; }

        /* Game Overlay */
        #game-view {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 999;
        }

        #close-btn {
            position: absolute; top: 20px; right: 20px;
            background: rgba(255,255,255,0.1); border: 1px solid white;
            color: white; padding: 8px 15px; cursor: pointer; z-index: 1000;
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <header>
        MILES_VAULT <span class="home-tag">// HOME_DIR</span>
    </header>

    <main>
        <div class="status-row">
            <div class="status-box">
                <div class="label">Network Node</div>
                <div class="value">ACTIVE_SECURE</div>
            </div>
            <div class="status-box">
                <div class="label">System Ping</div>
                <div class="value" id="ping">12ms</div>
            </div>
            <div class="status-box">
                <div class="label">Access Level</div>
                <div class="value">ADMIN_ROOT</div>
            </div>
        </div>

        <h2>AVAILABLE_PROJECTS</h2>

        <div class="game-grid">
            <div class="game-card" onmousemove="repel(event, this)" onmouseleave="resetCard(this)" onclick="launchGame()">
                <div class="icon">⛏️</div>
                <h3>Eaglercraft 1.8</h3>
            </div>

            <div class="game-card" onmousemove="repel(event, this)" onmouseleave="resetCard(this)">
                <div class="icon">🕹️</div>
                <h3>Project_B</h3>
            </div>
        </div>
    </main>

    <div id="game-view">
        <button id="close-btn" onclick="killGame()">TERMINATE_SESSION</button>
        <iframe id="gameFrame" allowfullscreen="true"></iframe>
    </div>

    <script>
        // --- REPEL EFFECT (Leans AWAY from mouse) ---
        function repel(e, card) {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;

            // Notice the negative values here make it "lean away"
            const rotateX = (centerY - y) / 6; 
            const rotateY = (x - centerX) / 6;

            card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(0.98)`;
        }

        function resetCard(card) {
            card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1)`;
        }

        // --- GAME LAUNCH ---
        async function launchGame() {
            const frame = document.getElementById('gameFrame');
            const view = document.getElementById('game-view');
            try {
                const response = await fetch('Game%20Code.xml');
                const text = await response.text();
                view.style.display = 'block';
                const doc = frame.contentDocument || frame.contentWindow.document;
                doc.open();
                doc.write(text);
                doc.close();
            } catch (e) { alert("Error: Game Code.xml not found."); }
        }

        function killGame() {
            document.getElementById('game-view').style.display = 'none';
            document.getElementById('gameFrame').src = '';
        }

        // Live Ping
        setInterval(() => {
            document.getElementById('ping').innerText = (Math.floor(Math.random() * 5) + 10) + 'ms';
        }, 3000);
    </script>
</body>
</html>
