<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL | Miles Cromar</title>
    <style>
        :root {
            --neon-purple: #8b5cf6;
            --neon-blue: #06b6d4;
            --dark-bg: #050507;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--dark-bg);
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            height: 100vh; overflow: hidden;
        }

        /* --- GATE KEEPER --- */
        #gate-keeper {
            position: fixed; inset: 0;
            background: #050507;
            z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }

        .gate-box {
            background: var(--glass); border: 1px solid var(--border);
            padding: 40px; border-radius: 4px; text-align: center; width: 300px;
        }

        input {
            background: rgba(0,0,0,0.8); border: 1px solid var(--border);
            color: var(--neon-blue); padding: 12px; width: 85%; margin-bottom: 20px; 
            border-radius: 2px; font-family: monospace; outline: none;
        }

        .enter-btn {
            background: transparent; color: var(--neon-purple); border: 1px solid var(--neon-purple);
            padding: 10px 20px; cursor: pointer; font-weight: bold; width: 100%;
            transition: 0.3s;
        }

        .enter-btn:hover { background: var(--neon-purple); color: white; }

        /* --- CONTENT --- */
        #vault-content { display: none; height: 100vh; flex-direction: column; }
        header { height: 50px; background: #0a0a0c; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 30px; font-weight: 900; letter-spacing: 2px; font-size: 0.8rem; }
        main { flex: 1; padding: 40px; overflow-y: auto; }
        
        .status-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .status-box { background: var(--glass); border: 1px solid var(--border); padding: 15px 20px; }
        
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 30px; }
        .game-card {
            background: var(--glass); border: 1px solid var(--border);
            aspect-ratio: 1/1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; border-radius: 8px;
            cursor: pointer; transition: 0.1s; transform-style: preserve-3d;
        }
        
        #game-view { display: none; position: fixed; inset: 0; background: #000; z-index: 10000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="gate-keeper">
        <div class="gate-box">
            <h2 style="font-size: 0.9rem; letter-spacing: 3px;">GATE_KEEPER v1.0</h2>
            <p id="gate-msg" style="font-size: 0.7rem; color: #64748b; margin-bottom: 25px;">IDENTIFY TO PROCEED</p>
            <input type="text" id="idKey" placeholder="USER_ID...">
            <button class="enter-btn" onclick="checkAuth()">INITIALIZE</button>
        </div>
    </div>

    <div id="vault-content">
        <header>MILES_VAULT <span style="color:var(--neon-purple); margin-left:15px; font-weight:400; opacity:0.6;">// ROOT_DIR</span></header>
        <main>
            <div class="status-row">
                <div class="status-box"><div style="font-size:0.6rem; color:#64748b;">LATENCY</div><div style="color:var(--neon-blue)" id="ping">12ms</div></div>
                <div class="status-box"><div style="font-size:0.6rem; color:#64748b;">NODE</div><div style="color:#10b981">ENCRYPTED</div></div>
                <div class="status-box"><div style="font-size:0.6rem; color:#64748b;">OPERATOR</div><div id="userDisplay">---</div></div>
            </div>

            <div class="game-grid">
                <div class="game-card" onmousemove="repel(event, this)" onmouseleave="resetCard(this)" onclick="launchGame()">
                    <span style="font-size:2.5rem;">⛏️</span>
                    <h3 style="font-size: 0.9rem;">Eaglercraft</h3>
                </div>
            </div>
        </main>
    </div>

    <div id="game-view">
        <button style="position:absolute; top:20px; right:20px; background:none; border:1px solid white; color:white; cursor:pointer;" onclick="killGame()">TERMINATE</button>
        <iframe id="gameFrame" allowfullscreen="true"></iframe>
    </div>

    <script>
        // --- ADMIN CONTROLS ---
        // Add names here to block them.
        const BLACKLIST = ["annoying_kid", "teacher_name", "hacker123"]; 
        // Add names here to let them in.
        const WHITELIST = ["miles", "guest", "friend1"]; 

        function checkAuth() {
            const input = document.getElementById('idKey').value.toLowerCase();
            const msg = document.getElementById('gate-msg');

            if (BLACKLIST.includes(input)) {
                msg.innerText = "CRITICAL ERROR: ACCESS PERMANENTLY REVOKED";
                msg.style.color = "#ef4444";
                document.getElementById('idKey').style.display = "none";
                return;
            }

            if (WHITELIST.includes(input) || input === "1234") {
                unlock(input);
            } else {
                msg.innerText = "USER NOT FOUND IN REGISTRY";
                msg.style.color = "#ef4444";
            }
        }

        function unlock(user) {
            document.getElementById('gate-keeper').style.display = 'none';
            document.getElementById('vault-content').style.display = 'flex';
            document.getElementById('userDisplay').innerText = user.toUpperCase();
            document.documentElement.requestFullscreen().catch(e => {});
        }

        // Repel & Game Logic
        function repel(e, card) {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            card.style.transform = `perspective(1000px) rotateX(${(centerY-y)/6}deg) rotateY(${(x-centerX)/6}deg) scale(0.97)`;
        }
        function resetCard(card) { card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1)`; }

        async function launchGame() {
            const frame = document.getElementById('gameFrame');
            const view = document.getElementById('game-view');
            try {
                const response = await fetch('Game%20Code.xml');
                const text = await response.text();
                view.style.display = 'block';
                const doc = frame.contentDocument || frame.contentWindow.document;
                doc.open(); doc.write(text); doc.close();
            } catch (e) { alert("File missing."); }
        }

        function killGame() {
            document.getElementById('game-view').style.display = 'none';
            document.getElementById('gameFrame').src = '';
        }

        setInterval(() => { document.getElementById('ping').innerText = (Math.floor(Math.random()*4)+11)+'ms'; }, 3000);
    </script>
</body>
</html>
