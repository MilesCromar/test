<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAULT | Miles Cromar</title>
    <style>
        :root {
            --maroon: #800000;
            --maroon-glow: rgba(128, 0, 0, 0.4);
            --dark-bg: #050507;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(128, 0, 0, 0.3);
        }

        body {
            margin: 0;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--dark-bg);
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            height: 50px;
            background: #0a0a0c;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 30px;
            font-weight: 900;
            letter-spacing: 2px;
            font-size: 0.8rem;
        }

        .home-tag { color: var(--maroon); margin-left: 15px; font-weight: 400; opacity: 0.7; }

        main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            background: radial-gradient(circle at center, #1a0000 0%, #050507 85%);
        }

        .status-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .status-box {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 15px 20px;
            border-radius: 4px;
            position: relative;
        }

        .label { font-size: 0.6rem; color: var(--maroon); text-transform: uppercase; margin-bottom: 5px; }
        .value { font-size: 0.9rem; color: #fff; font-family: monospace; }

        .panic-ui {
            display: none;
            position: absolute;
            top: 100%; left: -1px; width: calc(100% + 2px);
            background: #0a0000; border: 1px solid var(--maroon);
            flex-direction: column; gap: 8px; padding: 12px;
            z-index: 200; box-shadow: 0 10px 30px rgba(0,0,0,1);
        }
        .p-btn {
            background: transparent; border: 1px solid var(--maroon);
            color: var(--maroon); font-size: 0.6rem; padding: 6px;
            cursor: pointer; text-transform: uppercase;
        }
        .p-btn:hover { background: var(--maroon); color: #fff; }
        .p-input {
            background: #000; border: 1px solid var(--maroon);
            color: #fff; font-size: 0.7rem; padding: 6px; outline: none; display: none;
        }

        h2 { font-size: 1rem; letter-spacing: 1px; margin-bottom: 25px; opacity: 0.8; }
        
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 30px;
        }

        /* REPEL CARDS */
        .game-card {
            background: var(--glass);
            border: 1px solid var(--border);
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            cursor: pointer;
            position: relative;
            /* Critical for Tilt */
            transform-style: preserve-3d;
            perspective: 1000px;
            transition: transform 0.1s ease-out, border-color 0.3s, box-shadow 0.3s;
            will-change: transform;
        }

        .game-card:hover {
            border-color: var(--maroon);
            box-shadow: 0 0 20px var(--maroon-glow);
        }

        .icon { font-size: 2.5rem; margin-bottom: 10px; pointer-events: none; }
        .game-card h3 { font-size: 0.9rem; margin: 0; color: white; pointer-events: none; }

        #game-view {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 999;
        }

        #close-btn {
            position: absolute; top: 20px; right: 20px;
            background: rgba(0,0,0,0.5); border: 1px solid var(--maroon);
            color: var(--maroon); padding: 8px 15px; cursor: pointer; z-index: 1000;
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <header>
        MILES_VAULT <span class="home-tag">// HOME_DIR</span>
    </header>

    <main>
        <div class="status-row">
            <div class="status-box">
                <div class="label">Network Node</div>
                <div class="value">ACTIVE_SECURE</div>
            </div>
            <div class="status-box">
                <div class="label">System Ping</div>
                <div class="value" id="ping">12ms</div>
            </div>
            <div class="status-box" id="panic-box" style="cursor: pointer;">
                <div class="label">Panic_Key</div>
                <div class="value" id="p-display">[ESC] -> GOOGLE</div>
                <div class="panic-ui" id="p-menu">
                    <button class="p-btn" onclick="rebind()">Rebind Key</button>
                    <button class="p-btn" onclick="showInput()">Change URL</button>
                    <input type="text" id="p-input" class="p-input" placeholder="Enter URL...">
                </div>
            </div>
        </div>

        <h2>AVAILABLE_PROJECTS</h2>

        <div class="game-grid">
            <div class="game-card" onmousemove="repel(event, this)" onmouseleave="resetCard(this)" onclick="launchGame()">
                <div class="icon">⛏️</div>
                <h3>Eaglercraft 1.8</h3>
            </div>
            <div class="game-card" onmousemove="repel(event, this)" onmouseleave="resetCard(this)">
                <div class="icon">🕹️</div>
                <h3>Project_B</h3>
            </div>
        </div>
    </main>

    <div id="game-view">
        <button id="close-btn" onclick="killGame()">TERMINATE_SESSION</button>
        <iframe id="gameFrame"></iframe>
    </div>

    <script>
        let pKey = "Escape";
        let pUrl = "https://www.google.com";
        let listening = false;

        // --- FIXED REPEL (Tilt) ---
        function repel(e, card) {
            const rect = card.getBoundingClientRect();
            // Get mouse position relative to card center
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;

            // Calculate rotation (Divide by 6-10 for intensity)
            // Negative values create the "repel" (leaning away)
            const rotateX = (centerY - y) / 6; 
            const rotateY = (x - centerX) / 6;

            card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(0.98)`;
        }

        function resetCard(card) {
            card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1)`;
        }

        // --- PANIC ---
        const menu = document.getElementById('p-menu');
        const box = document.getElementById('panic-box');
        const input = document.getElementById('p-input');

        box.onclick = (e) => {
            e.stopPropagation();
            menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
        };

        window.onclick = () => menu.style.display = 'none';

        function rebind() { listening = true; document.getElementById('p-display').innerText = "LISTENING..."; }
        function showInput() { input.style.display = 'block'; input.focus(); }

        input.onkeydown = (e) => {
            if(e.key === 'Enter') {
                pUrl = input.value.startsWith('http') ? input.value : 'https://' + input.value;
                input.style.display = 'none';
                updateP();
            }
        };

        window.onkeydown = (e) => {
            if(listening) { pKey = e.key; listening = false; updateP(); return; }
            if(e.key === pKey) window.location.href = pUrl;
        };

        function updateP() {
            let host = new URL(pUrl).hostname.toUpperCase();
            document.getElementById('p-display').innerText = `[${pKey.toUpperCase()}] -> ${host}`;
        }

        // --- GAME ---
        async function launchGame() {
            const frame = document.getElementById('gameFrame');
            const view = document.getElementById('game-view');
            try {
                const response = await fetch('Game%20Code.xml');
                const text = await response.text();
                view.style.display = 'block';
                const doc = frame.contentDocument || frame.contentWindow.document;
                doc.open();
                doc.write(text);
                doc.close();
            } catch (e) { alert("Game Code.xml not found."); }
        }

        function killGame() {
            document.getElementById('game-view').style.display = 'none';
            document.getElementById('gameFrame').src = '';
        }

        setInterval(() => {
            document.getElementById('ping').innerText = (Math.floor(Math.random() * 5) + 10) + 'ms';
        }, 3000);
    </script>
</body>
</html>
