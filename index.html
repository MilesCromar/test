<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL | Miles Cromar</title>
    <style>
        :root {
            --neon-purple: #8b5cf6;
            --neon-blue: #06b6d4;
            --dark-bg: #050507;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--dark-bg);
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            height: 100vh; overflow: hidden;
        }

        /* --- LOCK SCREEN --- */
        #lock-screen {
            position: fixed; inset: 0;
            background: radial-gradient(circle at center, #111118, #050507);
            z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }

        .lock-box {
            background: var(--glass); border: 1px solid var(--border);
            padding: 40px; border-radius: 12px; text-align: center; width: 320px;
        }

        input {
            background: rgba(0,0,0,0.5); border: 1px solid var(--border);
            color: white; padding: 12px; width: 80%; margin-bottom: 20px; border-radius: 4px;
        }

        .request-btn {
            background: var(--neon-purple); color: white; border: none;
            padding: 12px 24px; cursor: pointer; font-weight: bold; border-radius: 4px;
        }

        /* --- MAIN CONTENT (Hidden) --- */
        #vault-content { display: none; height: 100vh; flex-direction: column; }

        header {
            height: 50px; background: #0a0a0c; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 30px;
            font-weight: 900; letter-spacing: 2px; font-size: 0.8rem;
        }

        main { flex: 1; padding: 40px; overflow-y: auto; background: radial-gradient(circle at top left, #0f0f1a, #050507); }

        /* Status Boxes */
        .status-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .status-box { background: var(--glass); border: 1px solid var(--border); padding: 15px 20px; border-radius: 4px; }
        .label { font-size: 0.6rem; color: #64748b; text-transform: uppercase; margin-bottom: 5px; }
        .value { font-size: 0.9rem; color: var(--neon-blue); font-family: monospace; }

        /* Game Grid & Repel Cards */
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 30px; }
        .game-card {
            background: var(--glass); border: 1px solid var(--border);
            aspect-ratio: 1/1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; border-radius: 8px;
            cursor: pointer; transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
        }
        .game-card:hover { border-color: var(--neon-purple); box-shadow: 0 0 20px rgba(139, 92, 246, 0.2); }
        .icon { font-size: 2.5rem; margin-bottom: 10px; }

        /* Admin link hidden at bottom */
        .admin-trigger { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); font-size: 0.6rem; color: #1a1a1e; cursor: pointer; user-select: none; }

        #game-view { display: none; position: fixed; inset: 0; background: #000; z-index: 10000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="lock-box">
            <h2 style="letter-spacing: 2px;">VAULT_LOCKED</h2>
            <p style="font-size: 0.7rem; color: #64748b; margin-bottom: 25px;">RESTRICTED ACCESS ONLY</p>
            <input type="text" id="idInput" placeholder="IDENTITY...">
            <button class="request-btn" onclick="requestAccess()">REQUEST ENTRY</button>
        </div>
        <div class="admin-trigger" onclick="adminAuth()">ADMIN_BYPASS</div>
    </div>

    <div id="vault-content">
        <header>MILES_VAULT <span style="color:var(--neon-purple); margin-left:15px; font-weight:400; opacity:0.6;">// ROOT_DIR</span></header>
        <main>
            <div class="status-row">
                <div class="status-box"><div class="label">System Latency</div><div class="value" id="ping">12ms</div></div>
                <div class="status-box"><div class="label">Auth Token</div><div class="value" style="color:#10b981">VALID</div></div>
                <div class="status-box"><div class="label">Session User</div><div class="value" id="userDisplay">GUEST</div></div>
            </div>

            <h2 style="font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 20px;">DEPLOYABLE_PROJECTS</h2>

            <div class="game-grid">
                <div class="game-card" onmousemove="repel(event, this)" onmouseleave="resetCard(this)" onclick="launchGame()">
                    <div class="icon">⛏️</div>
                    <h3 style="font-size: 0.9rem;">Eaglercraft 1.8</h3>
                </div>
                <div class="game-card" onmousemove="repel(event, this)" onmouseleave="resetCard(this)">
                    <div class="icon">🕹️</div>
                    <h3 style="font-size: 0.9rem;">Project_B</h3>
                </div>
            </div>
        </main>
    </div>

    <div id="game-view">
        <button style="position:absolute; top:20px; right:20px; background:none; border:1px solid white; color:white; cursor:pointer; padding:5px 10px;" onclick="killGame()">TERMINATE</button>
        <iframe id="gameFrame" allowfullscreen="true"></iframe>
    </div>

    <script>
        // Repel Effect
        function repel(e, card) {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            const rotateX = (centerY - y) / 6;
            const rotateY = (x - centerX) / 6;
            card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(0.97)`;
        }
        function resetCard(card) { card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1)`; }

        // Security Logic
        function requestAccess() {
            const name = document.getElementById('idInput').value;
            if(!name) return;
            const subject = encodeURIComponent("VAULT ACCESS REQUEST");
            const body = encodeURIComponent(name + " is requesting access to your game vault.");
            window.location.href = `mailto:milesCromar@gmail.com?subject=${subject}&body=${body}`;
            alert("Request logged. Send the email to notify Miles.");
        }

        function adminAuth() {
            const pw = prompt("SYSTEM PASSWORD:");
            if(pw === "1234") {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('vault-content').style.display = 'flex';
                document.getElementById('userDisplay').innerText = "ADMIN_MILES";
                // Try to go fullscreen to hide Chrome UI
                document.documentElement.requestFullscreen().catch(e => {});
            }
        }

        async function launchGame() {
            const frame = document.getElementById('gameFrame');
            const view = document.getElementById('game-view');
            try {
                const response = await fetch('Game%20Code.xml');
                const text = await response.text();
                view.style.display = 'block';
                const doc = frame.contentDocument || frame.contentWindow.document;
                doc.open(); doc.write(text); doc.close();
            } catch (e) { alert("File 'Game Code.xml' not found."); }
        }

        function killGame() {
            document.getElementById('game-view').style.display = 'none';
            document.getElementById('gameFrame').src = '';
        }

        setInterval(() => { document.getElementById('ping').innerText = (Math.floor(Math.random()*4)+11)+'ms'; }, 3000);
    </script>
</body>
</html>
