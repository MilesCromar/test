<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL | Locked</title>
    <style>
        :root {
            --neon-purple: #8b5cf6;
            --neon-blue: #06b6d4;
            --dark-bg: #050507;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--dark-bg);
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            height: 100vh; overflow: hidden;
        }

        /* --- LOCK SCREEN LAYER --- */
        #lock-screen {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #111118, #050507);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(20px);
        }

        .lock-box {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .status-dot {
            width: 10px; height: 10px;
            background: #ef4444; /* Red for locked */
            border-radius: 50%;
            margin: 0 auto 20px;
            box-shadow: 0 0 10px #ef4444;
        }

        input {
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            width: 80%;
            margin-bottom: 20px;
            border-radius: 4px;
            outline: none;
        }

        .request-btn {
            background: var(--neon-purple);
            color: white;
            border: none;
            padding: 12px 24px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }

        .admin-link {
            margin-top: 30px;
            font-size: 0.7rem;
            color: #475569;
            text-decoration: none;
            cursor: pointer;
        }

        /* --- MAIN VAULT CONTENT (Hidden until unlocked) --- */
        #vault-content { display: none; }

        header { height: 50px; background: #0a0a0c; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 30px; font-weight: 900; letter-spacing: 2px; font-size: 0.8rem; }
        main { padding: 40px; }
        .status-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 50px; }
        .status-box { background: var(--glass); border: 1px solid var(--border); padding: 15px 20px; }
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 30px; }
        .game-card { background: var(--glass); border: 1px solid var(--border); aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; transition: 0.1s; }
        #game-view { display: none; position: fixed; inset: 0; background: #000; z-index: 10000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="lock-box">
            <div class="status-dot" id="dot"></div>
            <h2 style="margin-bottom: 10px;">SYSTEM_LOCKED</h2>
            <p style="font-size: 0.8rem; color: #94a3b8; margin-bottom: 30px;">Request access to deploy projects.</p>
            
            <input type="text" id="userName" placeholder="Enter Identity...">
            <button class="request-btn" onclick="sendRequest()">SEND ACCESS REQUEST</button>
            
            <div class="admin-link" onclick="adminOverride()">// ADMIN_OVERRIDE</div>
        </div>
    </div>

    <div id="vault-content">
        <header>MILES_VAULT <span style="color:var(--neon-purple); margin-left:15px; font-weight:400; opacity:0.7;">// HOME_DIR</span></header>
        <main>
            <div class="status-row">
                <div class="status-box"><div>PING</div><div style="color:var(--neon-blue)" id="ping">12ms</div></div>
                <div class="status-box"><div>STATUS</div><div style="color:#10b981">AUTHORIZED</div></div>
                <div class="status-box"><div>USER</div><div id="displayUser">---</div></div>
            </div>
            <div class="game-grid">
                <div class="game-card" onclick="launchGame()"><h3>⛏️ Eaglercraft</h3></div>
                <div class="game-card"><h3>🕹️ Project_B</h3></div>
            </div>
        </main>
    </div>

    <div id="game-view">
        <button style="position:absolute; top:20px; right:20px;" onclick="killGame()">TERMINATE</button>
        <iframe id="gameFrame"></iframe>
    </div>

    <script>
        function sendRequest() {
            const user = document.getElementById('userName').value;
            if(!user) return alert("Identify yourself.");

            // This opens the user's email app with your info pre-filled
            const subject = encodeURIComponent("ACCESS REQUEST: " + user);
            const body = encodeURIComponent(user + " is requesting permission to join the Vault.");
            window.location.href = `mailto:milesCromar@gmail.com?subject=${subject}&body=${body}`;
            
            alert("Request Protocol Initiated. Check your email app to send.");
        }

        // For you to get in instantly
        function adminOverride() {
            const pass = prompt("Enter Admin Credentials:");
            if(pass === "1234") { // Change "1234" to your secret password
                unlock();
            } else {
                alert("Unauthorized.");
            }
        }

        function unlock() {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('vault-content').style.display = 'block';
            document.getElementById('displayUser').innerText = "ADMIN_MILES";
        }

        async function launchGame() {
            const frame = document.getElementById('gameFrame');
            const view = document.getElementById('game-view');
            try {
                const response = await fetch('Game%20Code.xml');
                const text = await response.text();
                view.style.display = 'block';
                const doc = frame.contentDocument || frame.contentWindow.document;
                doc.open(); doc.write(text); doc.close();
            } catch (e) { alert("File missing."); }
        }

        function killGame() {
            document.getElementById('game-view').style.display = 'none';
            document.getElementById('gameFrame').src = '';
        }
    </script>
</body>
</html>
