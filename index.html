<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL | Miles Cromar</title>
    <style>
        :root {
            --neon-purple: #8b5cf6;
            --neon-blue: #06b6d4;
            --dark-bg: #0a0a0c;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--dark-bg);
            color: #e2e8f0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Navigation */
        aside {
            width: 260px;
            background: rgba(15, 15, 18, 0.95);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .brand {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--neon-purple);
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .nav-link {
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
            color: #94a3b8;
        }

        .nav-link:hover, .nav-link.active {
            background: var(--glass);
            color: white;
            box-shadow: inset 0 0 10px rgba(139, 92, 246, 0.2);
        }

        /* Main Content Area */
        main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            background: radial-gradient(circle at top right, #1e1b4b, #0a0a0c);
        }

        .header-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--glass);
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            flex: 1;
        }

        .stat-label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; }
        .stat-value { font-size: 1.2rem; font-weight: bold; color: var(--neon-blue); }

        /* Featured Game Card */
        .featured-card {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 400px;
            background: url('https://images.unsplash.com/photo-1627398242454-45a1465c2479?q=80&w=1000&auto=format&fit=crop') center/cover;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .featured-card:hover { transform: scale(1.02); border-color: var(--neon-purple); }

        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 40px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
        }

        .play-btn {
            background: var(--neon-purple);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
        }

        /* Game Frame */
        #game-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 9999;
        }

        #close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10000;
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <aside>
        <div class="brand">MILES_VLT</div>
        <div class="nav-link active">DASHBOARD</div>
        <div class="nav-link">LIBRARY</div>
        <div class="nav-link">SERVERS</div>
        <div class="nav-link">SETTINGS</div>
    </aside>

    <main>
        <div class="header-stats">
            <div class="stat-card">
                <div class="stat-label">System Status</div>
                <div class="stat-value">ONLINE</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">User Profile</div>
                <div class="stat-value">ADMIN_MILES</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Latency</div>
                <div class="stat-value">12ms</div>
            </div>
        </div>

        <h1>DEPLOY PROJECTS</h1>
        
        <div class="featured-card" onclick="launchGame()">
            <div class="overlay">
                <h2 style="margin:0;">Eaglercraft 1.8</h2>
                <p style="color: #cbd5e1;">Private School Bypass Engine v2.4</p>
                <button class="play-btn">INITIATE SESSION</button>
            </div>
        </div>
    </main>

    <div id="game-container">
        <button id="close-btn" onclick="closeGame()">✕</button>
        <iframe id="gameFrame" allowfullscreen="true"></iframe>
    </div>

    <script>
        async function launchGame() {
            const container = document.getElementById('game-container');
            const iframe = document.getElementById('gameFrame');

            try {
                const response = await fetch('Game%20Code.xml');
                const text = await response.text();
                
                container.style.display = 'block';

                const doc = iframe.contentDocument || iframe.contentWindow.document;
                doc.open();
                doc.write(text);
                doc.close();
            } catch (err) {
                alert('Fatal Error: Game Code.xml missing from root.');
            }
        }

        function closeGame() {
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('gameFrame').src = ''; // Stops audio
        }
    </script>
</body>
</html>
