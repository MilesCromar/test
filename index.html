<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COLD | VAULT</title>
    <style>
        :root {
            --maroon: #800000;
            --maroon-glow: rgba(128, 0, 0, 0.4);
            --dark-bg: #000000;
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(128, 0, 0, 0.2);
        }

        body {
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            /* THE VAULT BACKGROUND */
            background: radial-gradient(circle at center, #1a0000 0%, var(--dark-bg) 85%);
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Fixed HUD Header */
        header {
            height: 60px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 100;
        }

        .brand { font-weight: 900; letter-spacing: 4px; font-size: 0.9rem; color: #fff; text-shadow: 0 0 10px var(--maroon-glow); }
        .dir-tag { color: var(--maroon); margin-left: 15px; font-weight: 400; opacity: 0.7; font-size: 0.7rem; }

        /* Main Area */
        main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        /* Status HUD - Better Layout */
        .status-row {
            display: flex;
            gap: 20px;
            margin-bottom: 60px;
            justify-content: flex-start;
        }

        .status-box {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 12px 20px;
            min-width: 160px;
            position: relative;
        }

        .label { font-size: 0.55rem; color: var(--maroon); text-transform: uppercase; margin-bottom: 5px; letter-spacing: 1px; }
        .value { font-size: 0.8rem; color: #fff; font-family: monospace; }

        /* ISOLATED PANIC SYSTEM */
        .panic-ui {
            display: none;
            position: absolute;
            top: 100%; left: -1px; width: calc(100% + 2px);
            background: #0a0000; border: 1px solid var(--maroon);
            flex-direction: column; gap: 8px; padding: 12px;
            z-index: 200; box-shadow: 0 10px 30px rgba(0,0,0,1);
        }
        .p-btn {
            background: transparent; border: 1px solid var(--maroon);
            color: var(--maroon); font-size: 0.6rem; padding: 6px;
            cursor: pointer; text-transform: uppercase;
        }
        .p-btn:hover { background: var(--maroon); color: #fff; }
        .p-input {
            background: #000; border: 1px solid var(--maroon);
            color: #fff; font-size: 0.7rem; padding: 6px; outline: none; display: none;
        }

        /* Game Grid */
        h2 { font-size: 0.8rem; letter-spacing: 3px; margin-bottom: 30px; color: var(--maroon); font-weight: 900; }
        
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 40px;
        }

        /* Square "Repel" Cards with Maroon Glow */
        .game-card {
            background: var(--glass);
            border: 1px solid var(--border);
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s ease-out, border-color 0.3s, box-shadow 0.3s;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .game-card:hover {
            border-color: var(--maroon);
            box-shadow: 0 0 30px var(--maroon-glow);
        }

        .icon { font-size: 2.5rem; margin-bottom: 10px; opacity: 0.6; transition: 0.3s; }
        .game-card:hover .icon { opacity: 1; transform: translateZ(20px); }
        .game-card h3 { font-size: 0.75rem; margin: 0; color: #666; letter-spacing: 2px; text-transform: uppercase; }
        .game-card:hover h3 { color: #fff; }

        /* Game Overlay */
        #game-view {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 999;
        }

        #close-btn {
            position: absolute; top: 20px; right: 20px;
            background: transparent; border: 1px solid var(--maroon);
            color: var(--maroon); padding: 10px 20px; cursor: pointer; z-index: 1000;
            font-size: 0.7rem; letter-spacing: 1px;
        }
        #close-btn:hover { background: var(--maroon); color: #fff; }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <header>
        <div class="brand">MILES_VAULT <span class="dir-tag">// ROOT_DIR</span></div>
    </header>

    <main>
        <div class="status-row">
            <div class="status-box">
                <div class="label">Network Node</div>
                <div class="value">ACTIVE_SECURE</div>
            </div>
            <div class="status-box">
                <div class="label">System Ping</div>
                <div class="value" id="ping">12ms</div>
            </div>
            <div class="status-box" id="panic-box" style="cursor: pointer;">
                <div class="label">Panic_Link</div>
                <div class="value" id="p-display">[ESC] -> GOOGLE</div>
                <div class="panic-ui" id="p-menu">
                    <button class="p-btn" onclick="rebind()">Rebind Key</button>
                    <button class="p-btn" onclick="showInput()">Change URL</button>
                    <input type="text" id="p-input" class="p-input" placeholder="Paste URL...">
                </div>
            </div>
        </div>

        <h2>AVAILABLE_PROJECTS</h2>

        <div class="game-grid">
            <div class="game-card" onmousemove="repel(event, this)" onmouseleave="resetCard(this)" onclick="launchGame()">
                <div class="icon">⛏️</div>
                <h3>Eaglercraft 1.8</h3>
            </div>

            <div class="game-card" onmousemove="repel(event, this)" onmouseleave="resetCard(this)">
                <div class="icon">💾</div>
                <h3>Project_B</h3>
            </div>
        </div>
    </main>

    <div id="game-view">
        <button id="close-btn" onclick="killGame()">TERMINATE_SESSION</button>
        <iframe id="gameFrame" allowfullscreen="true"></iframe>
    </div>

    <script>
        let pKey = "Escape";
        let pUrl = "https://www.google.com";
        let listening = false;

        // --- REPEL EFFECT (Your Version) ---
        function repel(e, card) {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            const rotateX = (centerY - y) / 8; 
            const rotateY = (x - centerX) / 8;
            card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(0.98)`;
        }

        function resetCard(card) {
            card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1)`;
        }

        // --- PANIC SYSTEM (Isolated) ---
        const menu = document.getElementById('p-menu');
        const box = document.getElementById('panic-box');
        const input = document.getElementById('p-input');

        box.onclick = (e) => {
            e.stopPropagation();
            menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
        }

        window.onclick = () => menu.style.display = 'none';

        function rebind() { listening = true; document.getElementById('p-display').innerText = "LISTENING..."; }
        function showInput() { input.style.display = 'block'; input.focus(); }

        input.onkeydown = (e) => {
            if(e.key === 'Enter') {
                pUrl = input.value.startsWith('http') ? input.value : 'https://' + input.value;
                input.style.display = 'none';
                updateP();
            }
        }

        window.onkeydown = (e) => {
            if(listening) { pKey = e.key; listening = false; updateP(); return; }
            if(e.key === pKey) window.location.href = pUrl;
        }
