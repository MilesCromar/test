<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAULT | Miles Cromar</title>
    <style>
        :root {
            --neon-purple: #8b5cf6;
            --neon-blue: #06b6d4;
            --dark-bg: #050507;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--dark-bg);
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Top Navigation Header */
        header {
            height: 60px;
            background: rgba(10, 10, 12, 0.9);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 30px;
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .title {
            font-size: 0.9rem;
            letter-spacing: 3px;
            font-weight: 900;
            color: white;
            text-transform: uppercase;
        }

        .breadcrumb {
            margin-left: 20px;
            color: var(--neon-purple);
            font-size: 0.8rem;
            font-weight: bold;
        }

        /* Main Content Layout */
        .layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar for Info */
        aside {
            width: 280px;
            padding: 30px;
            background: rgba(0,0,0,0.2);
            border-right: 1px solid var(--border);
        }

        .status-item {
            margin-bottom: 25px;
        }

        .label { font-size: 0.65rem; color: #64748b; text-transform: uppercase; margin-bottom: 5px; }
        .value { font-size: 0.9rem; color: var(--neon-blue); font-family: monospace; }

        /* Game Library Grid */
        main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            perspective: 1000px; /* Required for the 3D tilt effect */
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }

        /* The 3D Hover Card */
        .game-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: transform 0.2s ease-out, box-shadow 0.2s ease-out, border-color 0.2s;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
        }

        .game-card:hover {
            border-color: var(--neon-purple);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 15px rgba(139, 92, 246, 0.2);
        }

        .icon-box {
            font-size: 3rem;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.1));
        }

        .game-card h3 {
            margin: 10px 0 5px;
            font-size: 1.1rem;
            color: white;
        }

        .game-card p {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-bottom: 15px;
        }

        /* Fullscreen Game Overlay */
        #game-view {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000;
        }

        #close-btn {
            position: absolute; top: 20px; right: 20px;
            background: rgba(255,255,255,0.1); border: 1px solid white;
            color: white; padding: 8px 15px; cursor: pointer; border-radius: 4px;
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <header>
        <div class="title">MILES_VAULT</div>
        <div class="breadcrumb">// HOME / LIBRARY</div>
    </header>

    <div class="layout">
        <aside>
            <div class="status-item">
                <div class="label">System Latency</div>
                <div class="value" id="ping">12ms</div>
            </div>
            <div class="status-item">
                <div class="label">User Auth</div>
                <div class="value">ROOT_USER</div>
            </div>
            <div class="status-item">
                <div class="label">Active Node</div>
                <div class="value">GITHUB_PAGES_SSL</div>
            </div>
        </aside>

        <main>
            <div class="game-grid">
                
                <div class="game-card" onmousemove="tilt(event, this)" onmouseleave="resetTilt(this)" onclick="launchGame()">
                    <div class="icon-box">⛏️</div>
                    <h3>Eaglercraft 1.8</h3>
                    <p>Standard Survival Build</p>
                </div>

                <div class="game-card" onmousemove="tilt(event, this)" onmouseleave="resetTilt(this)">
                    <div class="icon-box">🕹️</div>
                    <h3>Project B</h3>
                    <p>Coming Soon...</p>
                </div>

                <div class="game-card" onmousemove="tilt(event, this)" onmouseleave="resetTilt(this)">
                    <div class="icon-box">🛰️</div>
                    <h3>Project C</h3>
                    <p>Locked Content</p>
                </div>

            </div>
        </main>
    </div>

    <div id="game-view">
        <button id="close-btn" onclick="killGame()">TERMINATE_SESSION</button>
        <iframe id="gameFrame" allowfullscreen="true"></iframe>
    </div>

    <script>
        // --- 3D TILT LOGIC ---
        function tilt(e, card) {
            const cardRect = card.getBoundingClientRect();
            const x = e.clientX - cardRect.left;
            const y = e.clientY - cardRect.top;
            
            const centerX = cardRect.width / 2;
            const centerY = cardRect.height / 2;
            
            const rotateX = (y - centerY) / 10;
            const rotateY = (centerX - x) / 10;
            
            card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-10px)`;
        }

        function resetTilt(card) {
            card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) translateY(0px)`;
        }

        // --- GAME LAUNCH LOGIC ---
        async function launchGame() {
            const frame = document.getElementById('gameFrame');
            const view = document.getElementById('game-view');
            try {
                const response = await fetch('Game%20Code.xml');
                const text = await response.text();
                view.style.display = 'block';
                const doc = frame.contentDocument || frame.contentWindow.document;
                doc.open();
                doc.write(text);
                doc.close();
            } catch (e) { alert("Deployment Error: Game Code.xml missing."); }
        }

        function killGame() {
            document.getElementById('game-view').style.display = 'none';
            document.getElementById('gameFrame').src = '';
        }

        // Live Ping Simulation
        setInterval(() => {
            document.getElementById('ping').innerText = (Math.floor(Math.random() * 4) + 11) + 'ms';
        }, 4000);
    </script>
</body>
</html>
