<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COLD | SYSTEM</title>
    <style>
        :root {
            --maroon: #800000;
            --maroon-glow: rgba(128, 0, 0, 0.6);
            --bg: #000000;
            --glass: rgba(128, 0, 0, 0.1);
            --border: rgba(128, 0, 0, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }

        body {
            /* THE VAULT BACKGROUND */
            background: radial-gradient(circle, #1a0000 0%, var(--bg) 80%);
            color: #fff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            opacity: 0;
        }

        /* Flicker Entrance */
        @keyframes boot {
            0% { opacity: 0; }
            10% { opacity: 0.3; }
            12% { opacity: 0.1; }
            20% { opacity: 0.8; }
            100% { opacity: 1; }
        }
        .boot-sequence { animation: boot 0.5s ease-in forwards; }

        header {
            padding: 25px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .nav-links { display: flex; gap: 25px; align-items: center; }
        .brand { color: #fff; font-weight: bold; font-size: 1.2rem; letter-spacing: 4px; margin-right: 20px; text-shadow: 0 0 10px var(--maroon-glow); }
        .nav-item { cursor: pointer; color: #444; transition: 0.3s; font-size: 0.9rem; }
        .nav-item:hover, .nav-item.active { color: var(--maroon); text-shadow: 0 0 10px var(--maroon-glow); }

        /* Status Panels */
        .status-container { display: flex; gap: 15px; }
        .panel {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 10px 18px;
            backdrop-filter: blur(10px);
            min-width: 150px;
            position: relative; /* Keep it anchored */
        }

        .label { display: block; font-size: 0.6rem; color: var(--maroon); margin-bottom: 4px; font-weight: bold; }
        .val { font-size: 0.8rem; letter-spacing: 1px; }

        /* ISOLATED PANIC SYSTEM (Floating) */
        .panic-ui {
            display: none;
            position: absolute;
            top: 100%;
            left: -1px;
            width: calc(100% + 2px);
            background: #0a0000;
            border: 1px solid var(--maroon);
            flex-direction: column;
            gap: 8px;
            padding: 12px;
            z-index: 200;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8);
        }
        .panic-btn {
            background: transparent;
            border: 1px solid var(--maroon);
            color: var(--maroon);
            font-size: 0.65rem;
            padding: 6px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }
        .panic-btn:hover { background: var(--maroon); color: #fff; }
        .panic-input {
            background: #000;
            border: 1px solid var(--maroon);
            color: #fff;
            font-size: 0.7rem;
            padding: 6px;
            outline: none;
            display: none;
        }

        /* Views */
        .view { display: none; padding: 60px 50px; flex: 1; overflow-y: auto; }
        .view.active { display: block; }

        /* Grid & Magnetic Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 40px; }
        .card {
            width: 230px; height: 230px;
            border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.1s ease-out, border 0.3s;
            cursor: pointer;
            background: rgba(0,0,0,0.2);
        }
        .card:hover { border-color: var(--maroon); box-shadow: 0 0 30px rgba(128, 0, 0, 0.15); }
        .card span { color: #222; text-transform: uppercase; letter-spacing: 3px; transition: 0.3s; }
        .card:hover span { color: var(--maroon); text-shadow: 0 0 10px var(--maroon); }

        /* Library List */
        .lib-row {
            display: flex; justify-content: space-between;
            padding: 20px; border-bottom: 1px solid var(--border);
            transition: 0.2s;
        }
        .lib-row:hover { background: var(--glass); color: var(--maroon); }

    </style>
</head>
<body id="main-body">

    <header>
        <div class="nav-links">
            <span class="brand">COLD</span>
            <span class="nav-item active" onclick="switchTab('home')">// HOME</span>
            <span class="nav-item" onclick="switchTab('library')">// LIBRARY</span>
            <span class="nav-item" onclick="switchTab('settings')">// SETTINGS</span>
        </div>

        <div class="status-container">
            <div class="panel">
                <span class="label">STATUS</span>
                <span class="val">AUTHORIZED</span>
            </div>
            <div class="panel">
                <span class="label">PING</span>
                <span class="val" id="ping">12MS</span>
            </div>
            <div class="panel" id="panic-box" style="cursor: pointer;">
                <span class="label">PANIC_KEY</span>
                <span class="val" id="panic-display">[ESC] -> GOOGLE</span>
                <div class="panic-ui" id="panic-menu">
                    <button class="panic-btn" onclick="listenKey()">Rebind Key</button>
                    <button class="panic-btn" onclick="showInput()">Change URL</button>
                    <input type="text" id="panic-url" class="panic-input" placeholder="Enter URL...">
                </div>
            </div>
        </div>
    </header>

    <div id="home" class="view active">
        <div class="grid">
            <div class="card"><span>PROJECT_A</span></div>
            <div class="card"><span>PROJECT_B</span></div>
            <div class="card"><span>PROJECT_C</span></div>
        </div>
    </div>

    <div id="library" class="view">
        <h2 style="color: var(--maroon); margin-bottom: 30px;">// SYSTEM_LIBRARY</h2>
        <div class="lib-row"><span>FILE_ID_098</span><span>STABLE</span></div>
        <div class="lib-row"><span>FILE_ID_043</span><span>STABLE</span></div>
        <div class="lib-row"><span>FILE_ID_112</span><span>ENCRYPTED</span></div>
    </div>

    <div id="settings" class="view">
        <h2 style="color: var(--maroon); margin-bottom: 30px;">// CORE_SETTINGS</h2>
        <p style="opacity: 0.4;">Vault security active. No adjustments required.</p>
    </div>

    <script>
        let pKey = "Escape";
        let pUrl = "https://www.google.com";
        let listening = false;

        // Boot Effect
        window.onload = () => document.getElementById('main-body').classList.add('boot-sequence');

        // Tab Switching
        function switchTab(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
        }

        // Live Ping Simulation
        setInterval(() => {
            document.getElementById('ping').innerText = Math.floor(Math.random() * 4 + 11) + "MS";
        }, 2500);

        // Panic System Logic
        const menu = document.getElementById('panic-menu');
        const box = document.getElementById('panic-box');

        box.addEventListener('click', (e) => {
            e.stopPropagation();
            menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
        });

        // AUTO-CLOSE on click away
        window.addEventListener('click', () => {
            menu.style.display = 'none';
        });

        function listenKey() {
            listening = true;
            document.getElementById('panic-display').innerText = "LISTENING...";
        }

        function showInput() {
            const input = document.getElementById('panic-url');
            input.style.display = 'block';
            input.focus();
        }

        document.getElementById('panic-url').onkeydown = (e) => {
            if(e.key === 'Enter') {
                let val = e.target.value;
                pUrl = val.startsWith('http') ? val : 'https://' + val;
                e.target.style.display = 'none';
                updateDisplay();
            }
        };

        window.onkeydown = (e) => {
            if(listening) {
                pKey = e.key;
                listening = false;
                updateDisplay();
                return;
            }
            if(e.key === pKey) {
                window.location.href = pUrl;
            }
        };

        function updateDisplay() {
            let host = new URL(pUrl).hostname.toUpperCase();
            document.getElementById('panic-display').innerText = `[${pKey.toUpperCase()}] -> ${host}`;
        }

        // Magnetic Card Physics
        document.querySelectorAll('.card').forEach(card => {
            card.onmousemove = (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left - rect.width/2;
                const y = e.clientY - rect.top - rect.height/2;
                card.style.transform = `perspective(1000px) rotateX(${-y/15}deg) rotateY(${x/15}deg) scale(1.03)`;
            };
            card.onmouseleave = () => {
                card.style.transform = `perspective(1000px) rotateX(0) rotateY(0) scale(1)`;
            };
        });
    </script>
</body>
</html>
