<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COLD | SYSTEM</title>
    <style>
        :root {
            --violet: #8b5cf6;
            --violet-glow: rgba(139, 92, 246, 0.4);
            --bg: #050505;
            --glass: rgba(139, 92, 246, 0.05);
            --border: rgba(139, 92, 246, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }

        body {
            background: radial-gradient(circle at center, #140d26 0%, var(--bg) 95%);
            color: #fff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            opacity: 0; /* Initial state for flicker */
        }

        /* The Boot Flicker Effect */
        @keyframes boot {
            0% { opacity: 0; }
            5% { opacity: 0.2; }
            7% { opacity: 0; }
            12% { opacity: 0.6; }
            15% { opacity: 0.1; }
            25% { opacity: 1; }
            100% { opacity: 1; }
        }
        .boot-sequence { animation: boot 0.5s ease-in forwards; }

        /* Navigation Bar */
        header {
            padding: 25px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .nav-links { display: flex; gap: 25px; align-items: center; }
        .brand { color: #fff; font-weight: bold; font-size: 1.2rem; letter-spacing: 3px; margin-right: 20px; }
        .nav-item { cursor: pointer; color: #555; transition: 0.3s; font-size: 0.9rem; }
        .nav-item:hover, .nav-item.active { color: var(--violet); text-shadow: 0 0 8px var(--violet-glow); }

        /* Glass Status Panels */
        .status-container { display: flex; gap: 15px; }
        .panel {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 10px 18px;
            backdrop-filter: blur(8px);
            min-width: 150px;
            transition: 0.3s;
        }
        .panel:hover { border-color: var(--violet-glow); }

        .label { display: block; font-size: 0.6rem; color: var(--violet); margin-bottom: 4px; opacity: 0.7; font-weight: bold; }
        .val { font-size: 0.8rem; letter-spacing: 1px; }

        /* Panic Interactive Box */
        .panic-controls {
            display: none;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }
        .panic-btn {
            background: transparent;
            border: 1px solid var(--violet);
            color: var(--violet);
            font-size: 0.65rem;
            padding: 4px;
            cursor: pointer;
            text-transform: uppercase;
        }
        .panic-btn:hover { background: var(--violet); color: #fff; }
        .panic-input {
            background: #000;
            border: 1px solid var(--violet);
            color: var(--violet);
            font-size: 0.7rem;
            padding: 4px;
            outline: none;
            display: none;
        }

        /* Dynamic Views */
        .view { display: none; padding: 60px 50px; flex: 1; overflow-y: auto; }
        .view.active { display: block; }

        /* Home View (Ghost Cards) */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 40px; 
            perspective: 1000px;
        }
        .card {
            width: 220px; height: 220px;
            border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.1s ease-out, border 0.3s, background 0.3s;
            cursor: pointer;
            background: transparent;
        }
        .card:hover { border-color: var(--violet); background: var(--glass); box-shadow: 0 0 25px rgba(139, 92, 246, 0.1); }
        .card span { color: #333; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; font-size: 0.8rem; }
        .card:hover span { color: var(--violet); text-shadow: 0 0 10px var(--violet); }

        /* Library View */
        .lib-row {
            display: flex; justify-content: space-between;
            padding: 15px 10px; border-bottom: 1px solid var(--border);
            font-size: 0.9rem; transition: 0.2s;
        }
        .lib-row:hover { background: var(--glass); color: var(--violet); }

    </style>
</head>
<body id="main-body">

    <header>
        <div class="nav-links">
            <span class="brand">COLD</span>
            <span class="nav-item active" onclick="switchTab('home')">// HOME</span>
            <span class="nav-item" onclick="switchTab('library')">// LIBRARY</span>
            <span class="nav-item" onclick="switchTab('settings')">// SETTINGS</span>
        </div>

        <div class="status-container">
            <div class="panel">
                <span class="label">ID</span>

                <span class="val" id="ping">12MS</span>
            </div>
            <div class="panel" id="panic-panel" style="cursor:pointer;">
                <span class="label">PANIC_LINK</span>
                <span class="val" id="panic-stat">[ESC] -> GOOGLE</span>
                <div class="panic-controls" id="panic-ui">
                    <button class="panic-btn" onclick="startRebind()">Change Key</button>
                    <button class="panic-btn" onclick="toggleUrlInput()">Change URL</button>
                    <input type="text" id="url-field" class="panic-input" placeholder="Enter URL...">
                </div>
            </div>
        </div>
    </header>

        <div class="grid">

            <div class="card" data-tilt><span>EXTRACT_02</span></div>
            <div class="card" data-tilt><span>EXTRACT_03</span></div>
        </div>
    </div>
