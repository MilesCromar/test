<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAULT | Miles Cromar</title>
    <style>
        :root {
            --emerald: #064e40;
            --emerald-bright: #0d9488;
            --amber: #f59e0b;
            --amber-glow: rgba(245, 158, 11, 0.4);
            --dark-bg: #020617;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(13, 148, 136, 0.3);
        }

        body {
            margin: 0;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--dark-bg);
            color: #e2e8f0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        aside {
            width: 200px;
            background: #010409;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 30px 0;
            z-index: 100;
        }

        .nav-item {
            padding: 15px 30px;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--emerald-bright);
            cursor: pointer;
            transition: 0.3s;
            border-left: 3px solid transparent;
            font-weight: 700;
        }

        .nav-item:hover { background: rgba(13, 148, 136, 0.05); color: #fff; }
        .nav-item.active { color: var(--amber); border-left: 3px solid var(--amber); background: rgba(245, 158, 11, 0.05); }

        /* --- MAIN CONTENT --- */
        .app-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            height: 50px;
            background: #010409;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 30px;
            font-weight: 900;
            letter-spacing: 2px;
            font-size: 0.8rem;
        }

        .location-tag { color: var(--amber); margin-left: 15px; font-weight: 400; opacity: 0.7; text-transform: uppercase; }

        main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            background: radial-gradient(circle at center, #062d27 0%, #020617 100%);
        }

        /* Status Row */
        .status-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .status-box {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 15px 20px;
            border-radius: 4px;
        }

        .label { font-size: 0.6rem; color: var(--emerald-bright); text-transform: uppercase; margin-bottom: 5px; }
        .value { font-size: 0.9rem; color: #fff; font-family: monospace; }

        /* Pages */
        .page-content { display: none; }
        .page-content.active { display: block; }

        /* Settings Visuals */
        .settings-grid { display: flex; flex-direction: column; gap: 20px; max-width: 400px; }
        .setting-item { background: var(--glass); border: 1px solid var(--border); padding: 20px; border-radius: 4px; }
        .setting-item h4 { margin: 0 0 10px 0; font-size: 0.7rem; color: var(--amber); text-transform: uppercase; }
        
        input {
            width: 100%; background: #000; border: 1px solid var(--emerald-bright);
            color: #fff; padding: 10px; font-family: monospace; outline: none; box-sizing: border-box;
        }

        .config-btn {
            margin-top: 10px; background: transparent; border: 1px solid var(--emerald-bright);
            color: var(--emerald-bright); padding: 12px; cursor: pointer; width: 100%; text-transform: uppercase; 
            font-size: 0.7rem; font-weight: bold; transition: all 0.2s;
        }

        /* NEW LISTENING STATE */
        .config-btn.listening {
            border-color: var(--amber);
            color: var(--amber);
            box-shadow: 0 0 15px var(--amber-glow);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .current-key-display {
            margin-top: 8px; font-size: 0.6rem; color: var(--emerald-bright); opacity: 0.6;
        }

        /* Projects */
        h2 { font-size: 1rem; letter-spacing: 1px; margin-bottom: 25px; color: var(--emerald-bright); }
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 30px; }

        .game-card {
            background: var(--glass); border: 1px solid var(--border); aspect-ratio: 1/1;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 8px; cursor: pointer; transition: transform 0.1s ease-out, border-color 0.3s;
            transform-style: preserve-3d; perspective: 1000px;
        }
        .game-card:hover { border-color: var(--amber); box-shadow: 0 0 20px var(--amber-glow); }
        .icon { font-size: 2.5rem; margin-bottom: 10px; pointer-events: none; }
        .game-card h3 { font-size: 0.9rem; margin: 0; color: white; pointer-events: none; }

        #game-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; }
        #close-btn { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.7); border: 1px solid var(--amber); color: #fff; padding: 8px 15px; cursor: pointer; z-index: 1000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <aside>
        <div class="nav-item active" onclick="showPage('main-page', 'Main')">Main</div>
        <div class="nav-item" onclick="showPage('library', 'Library')">Library</div>
        <div class="nav-item" onclick="showPage('settings', 'Settings')">Settings</div>
    </aside>

    <div class="app-container">
        <header>MILES_VAULT <span id="header-loc" class="location-tag">// MAIN</span></header>

        <main>
            <div class="status-row">
                <div class="status-box">
                    <div class="label">System</div>
                    <div class="value">ONLINE</div>
                </div>
                <div class="status-box">
                    <div class="label">Ping</div>
                    <div class="value" id="ping">12ms</div>
                </div>
                <div class="status-box">
                    <div class="label">Panic</div>
                    <div class="value" id="p-display">[ESCAPE] -> GOOGLE</div>
                </div>
            </div>

            <section id="main-page" class="page-content active">
                <h2>PROJECTS</h2>
                <div class="game-grid">
                    <div class="game-card" onmousemove="repel(event, this)" onmouseleave="resetCard(this)" onclick="launchGame()">
                        <div class="icon">⛏️</div>
                        <h3>Eaglercraft 1.8</h3>
                    </div>
                </div>
            </section>

            <section id="library" class="page-content">
                <h2>LIBRARY</h2>
                <p style="color: var(--emerald-bright); opacity: 0.6;">Library archive empty.</p>
            </section>

            <section id="settings" class="page-content">
                <h2>SETTINGS</h2>
                <div class="settings-grid">
                    <div class="setting-item">
                        <h4>Panic Switch</h4>
                        <button class="config-btn" id="bind-btn" onclick="startRebind()">Set Trigger Key</button>
                        <div id="active-key-text" class="current-key-display">Current Key: ESCAPE</div>
                        
                        <div style="margin-top: 20px;">
                            <label class="label">Emergency URL</label>
                            <input type="text" id="url-input" placeholder="https://google.com" onchange="updateUrl(this.value)">
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="game-view">
        <button id="close-btn" onclick="killGame()">CLOSE GAME</button>
        <iframe id="gameFrame" allowfullscreen></iframe>
    </div>

    <script>
        let pKey = "Escape";
        let pUrl = "https://www.google.com";
        let listening = false;

        function showPage(pageId, pageName) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            event.currentTarget.classList.add('active');
            document.getElementById('header-loc').innerText = `// ${pageName.toUpperCase()}`;
        }

        function repel(e, card) {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left, y = e.clientY - rect.top;
            const centerX = rect.width / 2, centerY = rect.height / 2;
            const rotateX = (centerY - y) / 6, rotateY = (x - centerX) / 6;
            card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(0.98)`;
        }

        function resetCard(card) {
            card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1)`;
        }

        // --- IMPROVED PANIC KEY SETTING ---
        function startRebind() {
            listening = true;
            const btn = document.getElementById('bind-btn');
            btn.innerText = "LISTENING...";
            btn.classList.add('listening');
        }

        function updateUrl(val) {
            pUrl = val.startsWith('http') ? val : 'https://' + val;
            updateDisplay();
        }

        window.onkeydown = (e) => {
            if(listening) {
                pKey = e.key;
                listening = false;
                
                const btn = document.getElementById('bind-btn');
                btn.innerText = "SET TRIGGER KEY";
                btn.classList.remove('listening');
                
                document.getElementById('active-key-text').innerText = `Current Key: ${pKey.toUpperCase()}`;
                updateDisplay();
                return;
            }
            if(e.key === pKey) window.location.href = pUrl;
        };

        function updateDisplay() {
            try {
                let host = new URL(pUrl).hostname.toUpperCase();
                document.getElementById('p-display').innerText = `[${pKey.toUpperCase()}] -> ${host}`;
            } catch(e) {
                document.getElementById('p-display').innerText = `[${pKey.toUpperCase()}] -> REDIRECT`;
            }
        }

        async function launchGame() {
            const frame = document.getElementById('gameFrame');
            const view = document.getElementById('game-view');
            try {
                const response = await fetch('Game%20Code.xml');
                const text = await response.text();
                view.style.display = 'block';
                const doc = frame.contentDocument || frame.contentWindow.document;
                doc.open(); doc.write(text); doc.close();
            } catch (e) { alert("XML File Not Found."); }
        }

        function killGame() {
            document.getElementById('game-view').style.display = 'none';
            document.getElementById('gameFrame').src = '';
        }

        setInterval(() => {
            document.getElementById('ping').innerText = (Math.floor(Math.random() * 5) + 10) + 'ms';
        }, 3000);
    </script>
</body>
</html>
